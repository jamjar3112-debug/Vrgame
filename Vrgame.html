<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest 3S VR Color Shooter</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    
    <script>
        // Web Audio API Setup for Sound Effects
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'hit') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.15);
            } else if (type === 'fail') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(180, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(80, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        // Custom component for the target logic
        AFRAME.registerComponent('target', {
            schema: {
                colorType: {type: 'string', default: 'red'}
            },
            init: function () {
                let el = this.el;
                let data = this.data;
                
                el.addEventListener('click', function (evt) {
                    let raycasterEl = evt.detail.cursorEl; 
                    let controllerId = raycasterEl.getAttribute('id');
                    
                    let scoreText = document.querySelector('#scoreText');
                    let currentScore = parseInt(scoreText.getAttribute('text').value.replace('SCORE: ', ''));
                    
                    let isCorrectHit = false;
                    if (data.colorType === 'red' && controllerId === 'leftHand') isCorrectHit = true;
                    if (data.colorType === 'blue' && controllerId === 'rightHand') isCorrectHit = true;
                    if (!controllerId) isCorrectHit = true; 

                    if (isCorrectHit) {
                        currentScore += 1;
                        scoreText.setAttribute('text', 'value', 'SCORE: ' + currentScore);
                        el.setAttribute('material', 'color', '#00ff00');
                        playSound('hit'); 
                    } else {
                        currentScore = 0;
                        scoreText.setAttribute('text', 'value', 'SCORE: WRONG COLOR!');
                        playSound('fail'); 
                        setTimeout(() => {
                            scoreText.setAttribute('text', 'value', 'SCORE: 0');
                        }, 1000);
                        el.setAttribute('material', 'color', '#ffffff');
                    }

                    setTimeout(() => {
                        respawnTarget(el);
                    }, 200);
                });
            }
        });

        function respawnTarget(el) {
            let angle = Math.random() * Math.PI * 2;
            let distance = Math.random() * 5 + 5; 
            
            let newX = Math.cos(angle) * distance;
            let newY = Math.random() * 3 + 0.8; 
            let newZ = Math.sin(angle) * distance;
            
            let isRed = Math.random() > 0.5;
            let nextColor = isRed ? '#ff0033' : '#0066ff';
            let nextType = isRed ? 'red' : 'blue';
            
            el.setAttribute('position', {x: newX, y: newY, z: newZ});
            el.setAttribute('material', 'color', nextColor);
            el.setAttribute('target', 'colorType', nextType);
        }
    </script>
</head>
<body>
    <a-scene>
        <a-assets>
            <img id="grid" src="https://cdn.aframe.io/a-painter/images/floor.jpg" crossorigin="anonymous">
        </a-assets>

        <a-sky color="#050510"></a-sky>
        <a-plane src="#grid" position="0 0 0" rotation="-90 0 0" width="40" height="40" repeat="20 20"></a-plane>

        <a-light type="ambient" color="#333344"></a-light>
        <a-light type="point" intensity="1.2" position="0 5 0"></a-light>

        <a-entity position="0 3.5 -3" 
                  geometry="primitive: plane; width: 2.5; height: 0.8" 
                  material="color: #111; opacity: 0.8">
            <a-text id="scoreText" value="SCORE: 0" align="center" position="0 0 0.05" color="#00d2ff" width="5" font="mozillavr"></a-text>
        </a-entity>

        <a-box target="colorType: red" position="2 1.5 -5" material="color: #ff0033; roughness: 0.2" 
               animation="property: rotation; to: 360 360 0; loop: true; dur: 4000; easing: linear"
               class="clickable">
        </a-box>

        <a-box target="colorType: blue" position="-2 2 -5.5" material="color: #0066ff; roughness: 0.2" 
               animation="property: rotation; to: -360 360 0; loop: true; dur: 5000; easing: linear"
               class="clickable">
        </a-box>

        <a-entity id="rig">
            <a-camera position="0 1.6 0">
                <a-cursor color="#fff" raycaster="objects: .clickable" far="30"></a-cursor>
            </a-camera>

            <a-entity id="leftHand" 
                      xr-controls="hand: left"
                      raycaster="objects: .clickable; far: 30; showLine: false" 
                      cursor="rayOrigin: entity">
                <a-line start="0 0 0" end="0 0 -30" color="#ff0033" opacity="0.6"></a-line>
            </a-entity>

            <a-entity id="rightHand" 
                      xr-controls="hand: right"
                      raycaster="objects: .clickable; far: 30; showLine: false" 
                      cursor="rayOrigin: entity">
                <a-line start="0 0 0" end="0 0 -30" color="#0066ff" opacity="0.6"></a-line>
            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        // Custom component to bind to Quest controllers without loading models
        AFRAME.registerComponent('xr-controls', {
            schema: {
                hand: {type: 'string', default: 'left'}
            },
            init: function () {
                let el = this.el;
                let hand = this.data.hand;
                
                // Track standard controller inputs using simple WebXR session tracking
                el.setAttribute('tracked-controls', {hand: hand, iterate: 'controller'});
                
                // Trigger click on target when pulling the index trigger
                el.addEventListener('triggerdown', function () {
                    let raycaster = el.components.raycaster;
                    if (raycaster && raycaster.intersectedEls.length > 0) {
                        raycaster.intersectedEls[0].emit('click', {
                            cursorEl: el,
                            intersection: raycaster.getIntersection(raycaster.intersectedEls[0])
                        });
                    }
                });
            }
        });
    </script>
</body>
</html>
